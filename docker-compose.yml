version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
    volumes:
      - ./api:/app
      - ./engine:/app/engine
    command: npm run dev
    working_dir: /app

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    working_dir: /app
    depends_on:
      - api

networks:
  default:
    name: clawpipe-network
